server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name bs-garage.ru www.bs-garage.ru 213.109.202.145 _;

    client_max_body_size 20M;

    root /var/www/bs-garage;
    index index.html;

    location /tt/ {
        proxy_pass http://127.0.0.1:8080/tt/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location = /tt {
        return 301 /tt/;
    }

    location /barber/ {
        try_files $uri $uri/ /barber/index.html;
    }

    location ~* ^/barber/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|txt)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
